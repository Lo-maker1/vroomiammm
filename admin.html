<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - Business Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // On garde tes numéros pour WhatsApp
        const driverNumbers = {
            'Marc': '22990000000', 
            'Boris': '2290195480000',
            'Yasmine': '22992000000'
        };

        // Variable globale pour stocker l'état des livreurs depuis Firebase
        let globalLivreurs = {};

        window.closeDay = () => {
            const currentCA = document.getElementById('stat-ca').innerText;
            if(confirm(`Voulez-vous clôturer la journée ? \nTotal encaissé : ${currentCA}`)) {
                const ordersRef = ref(db, 'orders');
                onValue(ordersRef, (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        Object.keys(data).forEach(id => {
                            if(data[id].status === 'Livré') {
                                update(ref(db, 'orders/' + id), { archived: true });
                            }
                        });
                    }
                }, { onlyOnce: true });
                alert("Journée clôturée ! 🛵💨");
            }
        };

        window.sendToDriver = async (id, name, phone, address, items, total, gps, restauGPS, restaurant) => {
            const selectEl = document.getElementById(`select-${id}`);
            const driverId = selectEl.value; // On récupère l'ID (ex: L1)
            
            if(!driverId) return alert("Choisis un livreur !");
            
            const driverName = globalLivreurs[driverId].nom;
            const num = driverNumbers[driverName];
            
            // 1. Marquer le livreur comme OCCUPÉ dans Firebase
            await update(ref(db, 'livreurs/' + driverId), { disponible: false });

            // 2. Mettre à jour la commande avec le nom du livreur
            await update(ref(db, 'orders/' + id), { driver: driverName, driverId: driverId });

            // 3. Préparer et envoyer le message WhatsApp
            const mapsLinkClient = (gps && gps.includes('http')) ? gps : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
            const mapsLinkResto = (restauGPS && restauGPS.includes('http')) ? restauGPS : 'Position non définie';

            const msg = `🚀 *COURSE VROUMIAM* 🛵\n` +
                        `------------------------------\n` +
                        `🏢 *RESTO :* ${restaurant || 'Vroumiam'}\n` +
                        `🍔 *MENU :* ${items}\n` +
                        `💰 *CASH :* ${total} F\n\n` +
                        `👤 *CLIENT :* ${name}\n` +
                        `📍 *QUARTIER :* ${address}\n\n` +
                        `🚩 *GPS RESTO :*\n${mapsLinkResto}\n\n` +
                        `📍 *GPS CLIENT :*\n${mapsLinkClient}\n` +
                        `------------------------------`;
            
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.updateStatus = async (id, newStatus, driverId) => {
            // Si on marque comme livré, on libère le livreur
            if(newStatus === 'Livré' && driverId) {
                await update(ref(db, 'livreurs/' + driverId), { disponible: true });
            }
            update(ref(db, 'orders/' + id), { status: newStatus });
        };

        // ÉCOUTE DES LIVREURS (Pour la liste dynamique)
        const livreursRef = ref(db, 'livreurs');
        onValue(livreursRef, (snapshot) => {
            globalLivreurs = snapshot.val() || {};
        });

        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('orders-list');
            
            let totalCA = 0;
            let activeOrders = 0;
            let driverStats = { 'Marc': 0, 'Boris': 0, 'Yasmine': 0 };

            container.innerHTML = '';

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const order = data[id];
                    if (order.archived === true) return;

                    const hasGPS = order.gps && order.gps.includes('http');
                    if (order.status === 'Livré') {
                        totalCA += parseInt(order.total) || 0;
                        if (order.driver && driverStats[order.driver] !== undefined) driverStats[order.driver]++;
                    } else {
                        activeOrders++;
                    }

                    // Génération des options du select (uniquement les dispos ou celui déjà assigné)
                    let driverOptions = `<option value="">-- Livreur --</option>`;
                    Object.keys(globalLivreurs).forEach(lKey => {
                        const l = globalLivreurs[lKey];
                        // On affiche si le livreur est disponible OU si c'est lui qui a déjà la commande
                        if (l.disponible || order.driver === l.nom) {
                            driverOptions += `<option value="${lKey}" ${order.driver === l.nom ? 'selected' : ''}>🛵 ${l.nom}</option>`;
                        }
                    });

                    const card = `
                        <div class="bg-gray-900 p-6 rounded-[2rem] border border-white/5 mb-6 shadow-2xl">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <h3 class="text-orange-500 font-black text-xl italic uppercase tracking-tighter">#${id.slice(-4)}</h3>
                                        <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-gray-400 font-bold uppercase tracking-widest">${order.restaurant || 'Resto'}</span>
                                    </div>
                                    <p class="text-white font-bold text-lg mt-1">${order.items}</p>
                                    <div class="mt-3 space-y-2 text-sm text-gray-400">
                                        <p>👤 <span class="text-white">${order.clientName}</span> (${order.phone})</p>
                                        <p>📍 ${order.address}</p>
                                        <div class="flex gap-2 mt-2">
                                            ${hasGPS ? `<a href="${order.gps}" target="_blank" class="inline-flex items-center gap-2 bg-blue-600/20 text-blue-400 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-blue-600/30 font-black italic">📍 Client</a>` : ''}
                                            ${order.restauGPS ? `<a href="${order.restauGPS}" target="_blank" class="inline-flex items-center gap-2 bg-orange-500/20 text-orange-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-orange-500/30 font-black italic text-orange-500">🏢 Resto</a>` : ''}
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="${order.status === 'Livré' ? 'bg-green-500' : 'bg-orange-500'} text-black text-[10px] font-black px-3 py-1 rounded-full uppercase italic">${order.status || 'En cours'}</span>
                                    <p class="text-2xl font-black text-white mt-3">${order.total} F</p>
                                </div>
                            </div>
                            <div class="mt-6 pt-6 border-t border-white/5">
                                <div class="flex gap-2">
                                    <select id="select-${id}" class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-sm font-bold text-orange-500 outline-none">
                                        ${driverOptions}
                                    </select>
                                    <button onclick="sendToDriver('${id}', '${order.clientName}', '${order.phone}', '${order.address}', '${order.items}', '${order.total}', '${order.gps || ''}', '${order.restauGPS || ''}', '${order.restaurant || ''}')" class="bg-orange-500 text-black px-6 rounded-2xl font-black text-xs active:scale-90 transition uppercase shadow-lg">🚀 Go</button>
                                </div>
                            </div>
                            <div class="mt-4 flex gap-3">
                                <button onclick="updateStatus('${id}', 'Livré', '${order.driverId || ''}')" class="flex-1 bg-white/5 border border-white/10 text-green-500 font-bold py-4 rounded-2xl transition uppercase text-[10px]">✅ Livré</button>
                                <a href="https://wa.me/${order.phone}" target="_blank" class="bg-[#25D366]/10 border border-[#25D366]/20 text-[#25D366] font-bold px-6 py-4 rounded-2xl italic text-[10px] flex items-center justify-center font-black">💬 Client</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('stat-ca').innerText = totalCA.toLocaleString() + ' F';
                document.getElementById('stat-active').innerText = activeOrders;
                
                document.getElementById('score-marc').innerText = driverStats['Marc'];
                document.getElementById('score-boris').innerText = driverStats['Boris'];
                document.getElementById('score-yasmine').innerText = driverStats['Yasmine'];
            }
        });
    </script>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans">

    <nav class="bg-black/60 backdrop-blur-xl border-b border-white/5 p-6 sticky top-0 z-50 text-center">
        <h1 class="text-3xl font-black text-orange-500 italic uppercase">VROUMIAM ADMIN</h1>
    </nav>

    <main class="p-6 max-w-2xl mx-auto pb-20">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-gray-900 border border-white/5 p-5 rounded-[1.5rem] text-center shadow-xl">
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-1">Ventes Jour</p>
                <p id="stat-ca" class="text-2xl font-black text-orange-500 italic">0 F</p>
            </div>
            <div class="bg-gray-900 border border-white/5 p-5 rounded-[1.5rem] text-center shadow-xl">
                <p class="text-[9px] text-gray-500 font-black uppercase tracking-widest mb-1">En cours</p>
                <p id="stat-active" class="text-2xl font-black text-white italic">0</p>
            </div>
        </div>

        <div class="bg-gray-900 border border-white/5 p-4 rounded-[1.5rem] mb-10 shadow-xl">
            <p class="text-[9px] text-center text-gray-500 font-black uppercase tracking-[0.2em] mb-4 italic">Performance Livreurs</p>
            <div class="flex justify-between items-center px-4">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-gray-400 tracking-tighter">MARC</p>
                    <p id="score-marc" class="text-xl font-black text-white">0</p>
                </div>
                <div class="w-px h-8 bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-gray-400 tracking-tighter">BORIS</p>
                    <p id="score-boris" class="text-xl font-black text-white">0</p>
                </div>
                <div class="w-px h-8 bg-white/10"></div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-gray-400 tracking-tighter text-orange-500">YASMINE</p>
                    <p id="score-yasmine" class="text-xl font-black text-white">0</p>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter text-orange-500 underline decoration-2 underline-offset-8">📦 Commandes</h2>
            <button onclick="closeDay()" class="bg-red-600/10 border border-red-600/30 text-red-500 text-[9px] font-black uppercase px-4 py-2 rounded-full hover:bg-red-600 hover:text-white transition active:scale-95">🔒 Clôturer</button>
        </div>

        <div id="orders-list">
            <div class="text-center py-20 text-gray-500 font-bold uppercase text-xs">Chargement du flux...</div>
        </div>
    </main>
</body>
</html>
