<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroumiam | TABLEAU DE BORD ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans" x-data="vroumAdmin">

    <nav class="bg-black p-4 border-b border-orange-500/30 flex justify-between items-center">
        <h1 class="text-xl font-black italic text-orange-500 text-uppercase">VROUMIAM ADMIN</h1>
        <div class="flex items-center space-x-4 text-[10px] font-bold">
            <span class="flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-2 status-pulse"></span> SYSTEME LIVE</span>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-sm font-black uppercase tracking-widest text-gray-500">Commandes à traiter</h2>
            
            <template x-if="orders.length === 0">
                <div class="bg-gray-800/50 border border-dashed border-gray-700 p-10 rounded-3xl text-center">
                    <p class="text-gray-500 italic">Aucune commande pour le moment...</p>
                </div>
            </template>

            <template x-for="order in orders" :key="order.id">
                <div class="bg-gray-800 rounded-[2rem] p-6 border border-white/5 shadow-2xl fade-in">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="bg-orange-500 text-black text-[10px] font-black px-2 py-1 rounded uppercase" x-text="order.restaurant"></span>
                            <h3 class="text-xl font-bold mt-2" x-text="order.items"></h3>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-orange-500" x-text="order.total + ' F'"></p>
                            <p class="text-[10px] text-gray-400" x-text="order.time"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6 text-sm">
                        <div class="bg-black/30 p-3 rounded-xl">
                            <p class="text-gray-500 text-[10px] uppercase font-black">Client</p>
                            <p class="font-bold" x-text="order.clientName"></p>
                            <p class="text-blue-400 underline text-xs" x-text="order.clientPhone"></p>
                        </div>
                        <div class="bg-black/30 p-3 rounded-xl">
                            <p class="text-gray-500 text-[10px] uppercase font-black">Zone</p>
                            <p class="font-bold text-orange-400" x-text="order.zone"></p>
                        </div>
                    </div>

                    <div class="flex space-x-2">
                        <button @click="verifyPayment(order)" class="flex-1 bg-green-600 hover:bg-green-500 py-3 rounded-xl font-black uppercase text-xs transition">
                            Vérifier MoMo
                        </button>
                        <button @click="dispatchOrder(order)" class="flex-1 bg-white text-black hover:bg-orange-500 hover:text-white py-3 rounded-xl font-black uppercase text-xs transition">
                            Affecter Livreur
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div class="space-y-4">
            <h2 class="text-sm font-black uppercase tracking-widest text-gray-500">Livreurs (25 max)</h2>
            <div class="bg-black/50 border border-white/5 rounded-[2rem] p-4 h-[600px] overflow-y-auto no-scrollbar">
                <template x-for="livreur in livreurs" :key="livreur.id">
                    <div class="flex items-center justify-between p-3 border-b border-white/5 hover:bg-white/5 transition rounded-xl">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center font-bold text-orange-500 text-xs" x-text="livreur.nom"></div>
                            <div>
                                <p class="text-sm font-bold text-white" x-text="livreur.nom"></p>
                                <p class="text-[9px] text-gray-500 font-bold uppercase" x-text="livreur.zone"></p>
                            </div>
                        </div>
                        <span :class="livreur.online ? 'bg-green-500' : 'bg-gray-700'" class="w-2 h-2 rounded-full"></span>
                    </div>
                </template>
                
                <button class="w-full mt-4 border border-dashed border-gray-700 py-4 rounded-xl text-xs text-gray-500 font-bold hover:border-orange-500 hover:text-orange-500 transition">
                    + Ajouter un livreur
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('vroumAdmin', () => ({
                // TA BASE DE DONNÉES LIVREURS (Modifie ici !)
                livreurs: [
                    { id: 1, nom: "Marc Kouassi", phone: "22961000000", zone: "Fidjrossè", online: true },
                    { id: 2, nom: "Jean Soglo", phone: "22997000000", zone: "Akpakpa", online: true },
                    { id: 3, nom: "Abel Dossou", phone: "22960000000", zone: "Calavi", online: false },
                    // Tu peux en ajouter jusqu'à 25 comme ça...
                ],

                // SIMULATION DE COMMANDES (Pour tester l'affichage)
                orders: [
                    { 
                        id: 101, 
                        restaurant: "Le Porc de Fidjrossè", 
                        items: "2kg Porc Grillé + Alloco", 
                        total: 12500, 
                        clientName: "M. Koffi", 
                        clientPhone: "22995959595",
                        zone: "Haie Vive",
                        time: "Il y a 2 min"
                    }
                ],

                verifyPayment(order) {
                    alert("Ouvre ton appli MoMo ! Si tu as reçu " + order.total + " F de " + order.clientName + ", tu peux affecter le livreur.");
                },

                dispatchOrder(order) {
                    // Logique de tri simple : On cherche le livreur de la zone
                    const meilleurLivreur = this.livreurs.find(l => l.online && l.zone === "Fidjrossè") || this.livreurs;
                    
                    const msg = `*MISSION VROUMIAM*%0A` +
                                `------------------%0A` +
                                `Resto: ${order.restaurant}%0A` +
                                `Commande: ${order.items}%0A` +
                                `Client: ${order.clientName} (${order.clientPhone})%0A` +
                                `Zone: ${order.zone}%0A` +
                                `------------------%0A` +
                                `*Tarif Livraison:* À encaisser au client.`;
                    
                    window.open(`https://wa.me/${meilleurLivreur.phone}?text=${msg}`, '_blank');
                }
            }));
        });
    </script>
</body>
</html>
