<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURATION DES LIVREURS ---
        const driverNumbers = {
            'Marc': '22990000000', 
            'Boris': '2290195480000',
            'Yasmine': '22992000000'
        };

        // Fonction mise à jour avec le VRAI GPS
        window.sendToDriver = (id, name, phone, address, items, total, gps) => {
            const selectEl = document.getElementById(`select-${id}`);
            const driverName = selectEl.value;
            
            if(!driverName) {
                alert("Choisis un livreur d'abord !");
                return;
            }
            
            const num = driverNumbers[driverName];
            const mapsLink = (gps && gps.includes('http')) ? gps : `https://www.google.com/maps/search/${encodeURIComponent(address)}`;
            
            const msg = `🚀 *NOUVELLE COURSE VROUMIAM* 🛵\n` +
                        `------------------------------\n` +
                        `🍔 *COMMANDE :* ${items}\n` +
                        `💰 *A ENCAISSER :* ${total} F\n\n` +
                        `👤 *CLIENT :* ${name}\n` +
                        `📞 *TEL :* ${phone}\n` +
                        `📍 *QUARTIER :* ${address}\n\n` +
                        `🗺️ *L'ITINÉRAIRE GPS :*\n${mapsLink}\n` +
                        `------------------------------\n` +
                        `⚡ *Vroum Vroum ! Bonne route !*`;
            
            window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.updateStatus = (id, newStatus) => {
            update(ref(db, 'orders/' + id), { status: newStatus });
        };

        window.updateDriver = (id, driverName) => {
            update(ref(db, 'orders/' + id), { driver: driverName });
        };

        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('orders-list');
            container.innerHTML = '';

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const order = data[id];
                    // On vérifie si le GPS existe pour afficher le bouton
                    const hasGPS = order.gps && order.gps.includes('http');
                    
                    const card = `
                        <div class="bg-gray-900 p-6 rounded-[2rem] border border-white/5 mb-6 shadow-2xl">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-orange-500 font-black text-xl italic uppercase tracking-tighter">Commande #${id.slice(-4)}</h3>
                                    <p class="text-white font-bold text-lg mt-1">${order.items}</p>
                                    <div class="mt-3 space-y-2 text-sm text-gray-400">
                                        <p>👤 <span class="text-white">${order.clientName}</span> (${order.phone})</p>
                                        <p>📍 ${order.address}</p>
                                        
                                        ${hasGPS ? `
                                            <a href="${order.gps}" target="_blank" class="inline-flex items-center gap-2 bg-blue-600/20 text-blue-400 px-3 py-2 rounded-xl text-[10px] font-black uppercase border border-blue-600/30">
                                                📍 Voir la position exacte
                                            </a>
                                        ` : '<p class="text-[10px] italic text-gray-600">GPS non activé par le client</p>'}
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="bg-orange-500 text-black text-[10px] font-black px-3 py-1 rounded-full uppercase italic">${order.status || 'En cours'}</span>
                                    <p class="text-2xl font-black text-white mt-3">${order.total} F</p>
                                </div>
                            </div>

                            <div class="mt-6 pt-6 border-t border-white/5">
                                <p class="text-[10px] text-gray-500 uppercase font-black mb-3 tracking-[0.2em]">Affectation Livreur</p>
                                <div class="flex gap-2">
                                    <select id="select-${id}" onchange="updateDriver('${id}', this.value)" 
                                        class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-sm font-bold text-orange-500 outline-none">
                                        <option value="">-- Sélectionner --</option>
                                        <option value="Marc" ${order.driver === 'Marc' ? 'selected' : ''}>🛵 Marc</option>
                                        <option value="Boris" ${order.driver === 'Boris' ? 'selected' : ''}>🛵 Boris</option>
                                        <option value="Yasmine" ${order.driver === 'Yasmine' ? 'selected' : ''}>🛵 Yasmine</option>
                                    </select>
                                    <button onclick="sendToDriver('${id}', '${order.clientName}', '${order.phone}', '${order.address}', '${order.items}', '${order.total}', '${order.gps || ''}')" 
                                        class="bg-orange-500 text-black px-6 rounded-2xl font-black text-xs active:scale-90 transition shadow-lg uppercase">
                                        🚀 Go
                                    </button>
                                </div>
                            </div>

                            <div class="mt-4 flex gap-3">
                                <button onclick="updateStatus('${id}', 'Livré')" class="flex-1 bg-white/5 border border-white/10 text-green-500 font-bold py-4 rounded-2xl transition uppercase text-[10px]">
                                    ✅ Marquer Livré
                                </button>
                                <a href="https://wa.me/${order.phone}" target="_blank" class="bg-[#25D366]/10 border border-[#25D366]/20 text-[#25D366] font-bold px-6 py-4 rounded-2xl">
                                    💬 Client
                                </a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } else {
                container.innerHTML = '<p class="text-gray-500 text-center py-20 italic">En attente de commandes...</p>';
            }
        });
    </script>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans">

    <nav class="bg-black/60 backdrop-blur-xl border-b border-white/5 p-6 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-3xl font-black text-orange-500 italic">VROUMIAM <span class="text-white text-[10px] font-light border border-white/20 px-2 py-0.5 ml-2 uppercase not-italic">Admin</span></h1>
            <div class="flex items-center gap-2 text-[10px] font-black uppercase text-green-500">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div> Live
            </div>
        </div>
    </nav>

    <main class="p-6 max-w-2xl mx-auto pb-20">
        <div id="orders-list">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-orange-500 mb-4"></div>
                <p class="text-gray-500 text-sm font-bold uppercase">Synchronisation...</p>
            </div>
        </div>
    </main>
</body>
</html>
