<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - Administration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // TA CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app", // Lien vers ta base France
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ÉCOUTER LES COMMANDES EN TEMPS RÉEL
        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const data = snapshot.val();
            const container = document.getElementById('orders-list');
            container.innerHTML = '';

            if (data) {
                Object.keys(data).reverse().forEach(id => {
                    const order = data[id];
                    const card = `
                        <div class="bg-gray-800 p-4 rounded-xl border-l-4 ${order.status === 'En cours' ? 'border-orange-500' : 'border-green-500'} mb-4 shadow-lg animate-pulse-once">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-orange-500 font-bold text-lg">Commande #${id.slice(-4)}</h3>
                                    <p class="text-white font-medium">${order.items}</p>
                                    <p class="text-gray-400 text-sm">Client : ${order.clientName} (${order.phone})</p>
                                    <p class="text-gray-400 text-sm">📍 ${order.address}</p>
                                </div>
                                <div class="text-right">
                                    <span class="bg-orange-900 text-orange-200 text-xs px-2 py-1 rounded-full">${order.status}</span>
                                    <p class="text-white font-bold mt-2">${order.total} FCFA</p>
                                </div>
                            </div>
                            <div class="mt-4 flex gap-2">
                                <button onclick="updateStatus('${id}', 'Livré')" class="bg-green-600 hover:bg-green-700 text-white text-xs px-4 py-2 rounded-lg transition">Marquer comme livré</button>
                                <button onclick="window.open('https://wa.me/${order.phone}')" class="bg-blue-600 text-white text-xs px-4 py-2 rounded-lg">Appeler Client</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } else {
                container.innerHTML = '<p class="text-gray-500 text-center py-10">Aucune commande pour le moment...</p>';
            }
        });

        window.updateStatus = (id, newStatus) => {
            update(ref(db, 'orders/' + id), { status: newStatus });
        };
    </script>
    <style>
        @keyframes pulse-once {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .animate-pulse-once { animation: pulse-once 0.5s ease-in-out; }
    </style>
</head>
<body class="bg-black text-white min-h-screen font-sans">

    <nav class="bg-gray-900 border-b border-orange-500/30 p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="text-2xl font-black text-orange-500 tracking-tighter">VROUMIAM <span class="text-white text-xs font-light tracking-normal border border-white px-1 ml-1">ADMIN</span></h1>
            <div id="status-dot" class="flex items-center gap-2 text-xs text-green-400">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-ping"></div> Live
            </div>
        </div>
    </nav>

    <main class="p-4 max-w-4xl mx-auto">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <p class="text-gray-400 text-sm">Commandes du jour</p>
                <p class="text-2xl font-bold text-white">Prêt</p>
            </div>
            <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800">
                <p class="text-gray-400 text-sm">Chiffre d'affaires</p>
                <p class="text-2xl font-bold text-orange-500">-- FCFA</p>
            </div>
        </div>

        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            📦 Commandes entrantes
        </h2>

        <div id="orders-list">
            <div class="text-center py-10">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-orange-500 mb-2"></div>
                <p class="text-gray-500 text-sm">Connexion à Firebase...</p>
             </div>
        </div>
    </main>

</body>
</html>
