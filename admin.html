<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - Business Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Nombres WhatsApp - Assure-toi que l'orthographe est identique au Firebase
        const driverNumbers = {
            'Marc': '22990000000', 
            'Boris': '2290195480000',
            'Yasmine': '22992000000'
        };

        let globalLivreurs = {};
        let globalOrders = {};

        onValue(ref(db, 'livreurs'), (snapshot) => {
            globalLivreurs = snapshot.val() || {};
            refreshUI(); 
        });

        onValue(ref(db, 'orders'), (snapshot) => {
            globalOrders = snapshot.val() || {};
            refreshUI();
        });

        function refreshUI() {
            const container = document.getElementById('orders-list');
            if (!container) return;

            let totalCA = 0;
            let activeOrders = 0;
            let driverStats = { 'Marc': 0, 'Boris': 0, 'Yasmine': 0 };

            container.innerHTML = '';

            if (globalOrders) {
                Object.keys(globalOrders).reverse().forEach(id => {
                    const order = globalOrders[id];
                    if (order.archived === true) return;

                    if (order.status === 'Livré') {
                        totalCA += parseInt(order.total) || 0;
                        const dName = order.driver; 
                        if (dName && driverStats[dName] !== undefined) driverStats[dName]++;
                    } else {
                        activeOrders++;
                    }

                    // Construction du sélecteur
                    let driverOptions = `<option value="">-- Choisir --</option>`;
                    let hasAvailable = false;

                    Object.keys(globalLivreurs).forEach(lKey => {
                        const l = globalLivreurs[lKey];
                        // On affiche si dispo OU si c'est déjà le livreur de cette commande
                        if (l.disponible === true || order.driverId === lKey) {
                            driverOptions += `<option value="${lKey}" ${order.driverId === lKey ? 'selected' : ''}>🛵 ${l.nom}</option>`;
                            hasAvailable = true;
                        }
                    });

                    if(!hasAvailable) driverOptions = `<option value="">❌ Aucun dispo</option>`;

                    const card = `
                        <div class="bg-gray-900 p-6 rounded-[2rem] border border-white/5 mb-6 shadow-2xl">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <h3 class="text-orange-500 font-black text-xl italic uppercase tracking-tighter">#${id.slice(-4)}</h3>
                                        <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-gray-400 font-bold uppercase tracking-widest">${order.restaurant || 'Resto'}</span>
                                    </div>
                                    <p class="text-white font-bold text-lg mt-1">${order.items}</p>
                                    <div class="mt-3 space-y-2 text-sm text-gray-400">
                                        <p>👤 <span class="text-white">${order.clientName}</span> (${order.phone})</p>
                                        <p>📍 ${order.address}</p>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="${order.status === 'Livré' ? 'bg-green-500' : 'bg-orange-500'} text-black text-[10px] font-black px-3 py-1 rounded-full uppercase italic">${order.status || 'En cours'}</span>
                                    <p class="text-2xl font-black text-white mt-3">${order.total} F</p>
                                </div>
                            </div>
                            <div class="mt-6 pt-6 border-t border-white/5">
                                <div class="flex gap-2">
                                    <select id="select-${id}" class="flex-1 bg-black border border-white/10 p-4 rounded-2xl text-sm font-bold text-orange-500 outline-none">
                                        ${driverOptions}
                                    </select>
                                    <button data-id="${id}" class="btn-go bg-orange-500 text-black px-6 rounded-2xl font-black text-xs active:scale-90 transition uppercase shadow-lg">🚀 Go</button>
                                </div>
                            </div>
                            <div class="mt-4 flex gap-3">
                                <button data-id="${id}" data-driverid="${order.driverId || ''}" class="btn-delivered flex-1 bg-white/5 border border-white/10 text-green-500 font-bold py-4 rounded-2xl transition uppercase text-[10px]">✅ Livré</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

                document.getElementById('stat-ca').innerText = totalCA.toLocaleString() + ' F';
                document.getElementById('stat-active').innerText = activeOrders;
                document.getElementById('score-marc').innerText = driverStats['Marc'];
                document.getElementById('score-boris').innerText = driverStats['Boris'];
                document.getElementById('score-yasmine').innerText = driverStats['Yasmine'];
            }
        }

        // Ecouteur de clic pour le bouton GO et LIVRÉ
        document.addEventListener('click', async (e) => {
            if (e.target.classList.contains('btn-go')) {
                const id = e.target.getAttribute('data-id');
                const driverId = document.getElementById(`select-${id}`).value;
                
                if(!driverId) return alert("Sélectionnez un livreur disponible !");
                
                const driverData = globalLivreurs[driverId];
                const order = globalOrders[id];
                const num = driverNumbers[driverData.nom];

                if(!num) return alert("Numéro introuvable pour " + driverData.nom);

                await update(ref(db, 'livreurs/' + driverId), { disponible: false });
                await update(ref(db, 'orders/' + id), { 
                    driver: driverData.nom, 
                    driverId: driverId, 
                    status: 'En route' 
                });

                const msg = `🚀 *COURSE VROUMIAM* 🛵\n` +
                            `🏢 *RESTO :* ${order.restaurant || 'Vroumiam'}\n` +
                            `🍔 *MENU :* ${order.items}\n` +
                            `💰 *CASH :* ${order.total} F\n` +
                            `👤 *CLIENT :* ${order.clientName}\n` +
                            `📍 *QUARTIER :* ${order.address}`;
                
                window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
            }

            if (e.target.classList.contains('btn-delivered')) {
                const id = e.target.getAttribute('data-id');
                const dId = e.target.getAttribute('data-driverid');
                if(dId) await update(ref(db, 'livreurs/' + dId), { disponible: true });
                update(ref(db, 'orders/' + id), { status: 'Livré' });
            }
        });

        window.closeDay = () => {
            if(confirm("Clôturer la journée ?")) {
                Object.keys(globalOrders).forEach(id => {
                    if(globalOrders[id].status === 'Livré') update(ref(db, 'orders/' + id), { archived: true });
                });
            }
        };
    </script>
</head>
<body class="bg-[#050505] text-white min-h-screen font-sans uppercase">
    <nav class="bg-black/60 backdrop-blur-xl border-b border-white/5 p-6 sticky top-0 z-50 text-center">
        <h1 class="text-3xl font-black text-orange-500 italic uppercase">VROUMIAM ADMIN</h1>
    </nav>
    <main class="p-6 max-w-2xl mx-auto pb-20">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-gray-900 border border-white/5 p-5 rounded-[1.5rem] text-center">
                <p class="text-[9px] text-gray-500 font-black mb-1">Ventes Jour</p>
                <p id="stat-ca" class="text-2xl font-black text-orange-500 italic">0 F</p>
            </div>
            <div class="bg-gray-900 border border-white/5 p-5 rounded-[1.5rem] text-center">
                <p class="text-[9px] text-gray-500 font-black mb-1">En cours</p>
                <p id="stat-active" class="text-2xl font-black text-white italic">0</p>
            </div>
        </div>

        <div class="bg-gray-900 border border-white/5 p-4 rounded-[1.5rem] mb-10 shadow-xl">
            <p class="text-[9px] text-center text-gray-500 font-black mb-4 italic">Performance Livreurs</p>
            <div class="flex justify-between items-center px-4">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-gray-400">MARC</p>
                    <p id="score-marc" class="text-xl font-black">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-gray-400">BORIS</p>
                    <p id="score-boris" class="text-xl font-black">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] font-bold text-orange-500">YASMINE</p>
                    <p id="score-yasmine" class="text-xl font-black">0</p>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic text-orange-500 uppercase">📦 Commandes</h2>
            <button onclick="closeDay()" class="bg-red-600/10 border border-red-600/30 text-red-500 text-[9px] font-black px-4 py-2 rounded-full uppercase">🔒 Clôturer</button>
        </div>

        <div id="orders-list">
            <div class="text-center py-20 text-gray-500 font-bold text-xs">Chargement...</div>
        </div>
    </main>
</body>
</html>
