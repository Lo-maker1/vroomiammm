<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - L'élite de la livraison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans" x-data="{ 
    cart: [], 
    showCart: false,
    view: 'restaurants',
    selectedRestau: null,
    step: 1,
    name: '', phone: '', address: '', delivery: 'express', isSending: false,
    paymentMethod: 'MTN',
    
    // ICI TU POURRAS MODIFIER LES LIENS GPS QUAND TU LES AURAS
    restaurants: [
        { 
            id: 1, name: 'Burger King Cotonou', 
            img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=600',
            gps: 'https://maps.app.goo.gl/fTCbPmB6dS8ica9k9?g_st=ii', // <--- À REMPLACER PLUS TARD
            menu: [ { name: 'Whopper Classic', price: 3500 }, { name: 'Double Cheese', price: 4500 } ]
        },
        { 
            id: 2, name: 'Pizza Relax', 
            img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600',
            gps: 'https://maps.google.com/?q=Pizza+Relax+Cotonou', // <--- À REMPLACER PLUS TARD
            menu: [ { name: 'Pizza Margherita', price: 5000 }, { name: 'Pizza Reine', price: 6500 } ]
        },
        { 
            id: 3, name: 'Maquis du Port', 
            img: 'https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?w=600',
            gps: 'https://maps.google.com/?q=Maquis+du+Port+Cotonou', // <--- À REMPLACER PLUS TARD
            menu: [ { name: 'Atassi Complet', price: 2500 }, { name: 'Igname Pilée', price: 3000 } ]
        }
    ],

    tempItem: null,
    options: { sauce: false, piment: false, boisson: false },

    openMenu(restau) { this.selectedRestau = restau; this.view = 'menu'; window.scrollTo(0,0); },
    prepareAdd(item) { this.tempItem = item; this.options = { sauce: false, piment: false, boisson: false }; },
    confirmAdd() {
        let finalName = this.tempItem.name;
        let extraPrice = 0;
        if(this.options.sauce) finalName += ' (+Sauce)';
        if(this.options.piment) finalName += ' (+Piment 🔥)';
        if(this.options.boisson) { finalName += ' (+Boisson)'; extraPrice += 500; }
        this.cart.push({ name: finalName, price: this.tempItem.price + extraPrice, id_order: Date.now() });
        this.tempItem = null;
    },

    get total() { return this.cart.reduce((sum, p) => sum + p.price, 0) + (this.delivery === 'express' ? 1000 : 500); },

    async finalizeOrder() {
        if(!this.name || !this.phone || !this.address) return alert('Remplis tes infos !');
        this.isSending = true;
        let gpsClient = 'Position non autorisée';
        try {
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 4000 });
            });
            if(position) gpsClient = `https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude}`;
        } catch (e) { gpsClient = 'GPS désactivé'; }

        const orderData = {
            clientName: this.name, phone: this.phone, address: this.address,
            items: this.cart.map(p => p.name).join(', '),
            restaurant: this.selectedRestau.name,
            restauGPS: this.selectedRestau.gps, // <--- ENVOI DU GPS RESTO À L'ADMIN
            total: this.total, payment: this.paymentMethod,
            timestamp: Date.now(), status: 'En cours', gps: gpsClient 
        };

        try {
            const response = await fetch('https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app/orders.json', {
                method: 'POST', body: JSON.stringify(orderData)
            });
            if (response.ok) {
                alert('🚀 VROUM ! Commande reçue.');
                this.cart = []; this.showCart = false; this.view = 'restaurants'; this.step = 1;
            }
        } catch (e) { alert('Erreur connexion'); } finally { this.isSending = false; }
    }
}">

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/90 backdrop-blur-xl z-40 border-b border-white/5">
        <h1 @click="view = 'restaurants'" class="text-3xl font-black italic text-orange-500 cursor-pointer uppercase">VROUMIAM</h1>
        <button @click="showCart = true" class="glass p-3 rounded-2xl relative">
            🛍️ <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] h-5 w-5 flex items-center justify-center rounded-full border-2 border-black" x-text="cart.length"></span>
        </button>
    </nav>

    <main x-show="view === 'restaurants'" class="px-6 pb-24 space-y-8 pt-6">
        <h2 class="text-xl font-black italic uppercase text-gray-400">Restaurants</h2>
        <template x-for="restau in restaurants" :key="restau.id">
            <div @click="openMenu(restau)" class="bg-gray-900/40 rounded-[2.5rem] p-3 border border-white/5 shadow-2xl active:scale-95 transition cursor-pointer">
                <div class="h-48 rounded-[2rem] overflow-hidden"><img :src="restau.img" class="w-full h-full object-cover"></div>
                <div class="p-5 flex justify-between items-center">
                    <h3 class="text-2xl font-black italic uppercase" x-text="restau.name"></h3>
                    <span class="text-orange-500 text-sm font-black italic">MENU ➔</span>
                </div>
            </div>
        </template>
    </main>

    <main x-show="view === 'menu'" class="px-6 pb-24 pt-6">
        <button @click="view = 'restaurants'" class="mb-6 text-gray-400 font-bold uppercase text-xs">← Retour</button>
        <h2 class="text-4xl font-black text-white italic uppercase mb-8" x-text="selectedRestau?.name"></h2>
        <div class="space-y-4">
            <template x-for="item in selectedRestau?.menu">
                <div class="glass p-6 rounded-[2rem] flex justify-between items-center">
                    <div><p class="font-black text-xl italic" x-text="item.name"></p><p class="text-orange-500 font-black" x-text="item.price + ' F'"></p></div>
                    <button @click="prepareAdd(item)" class="bg-orange-500 text-black h-12 w-12 rounded-2xl flex items-center justify-center font-black text-2xl">+</button>
                </div>
            </template>
        </div>
    </main>

    <div x-show="tempItem" class="fixed inset-0 z- bg-black/90 flex items-center justify-center p-6">
        <div class="bg-gray-900 w-full max-w-sm rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
            <h3 class="text-2xl font-black italic text-center mb-6 uppercase text-orange-500" x-text="tempItem?.name"></h3>
            <div class="space-y-4 mb-8">
                <label class="flex items-center justify-between p-4 glass rounded-2xl cursor-pointer font-bold italic"><span>Sauce Mayo/Ketch</span><input type="checkbox" x-model="options.sauce" class="w-6 h-6"></label>
                <label class="flex items-center justify-between p-4 glass rounded-2xl cursor-pointer font-bold italic text-red-500"><span>Piment 🔥</span><input type="checkbox" x-model="options.piment" class="w-6 h-6"></label>
                <label class="flex items-center justify-between p-4 glass rounded-2xl cursor-pointer font-bold italic"><span>Boisson (+500 F)</span><input type="checkbox" x-model="options.boisson" class="w-6 h-6"></label>
            </div>
            <div class="flex gap-3">
                <button @click="tempItem = null" class="flex-1 py-4 text-gray-500 font-black uppercase text-xs">Annuler</button>
                <button @click="confirmAdd()" class="flex-2 bg-orange-500 text-black px-8 py-4 rounded-2xl font-black uppercase italic">Ajouter</button>
            </div>
        </div>
    </div>

    <div x-show="showCart" class="fixed inset-0 z-50 bg-black/95 p-6 flex flex-col">
        <div class="flex justify-between mb-8"><button @click="showCart = false; step = 1" class="text-gray-400 font-bold uppercase">Retour</button></div>
        <div x-show="step === 1" class="flex flex-col h-full">
            <h2 class="text-4xl font-black mb-8 italic uppercase text-white">Panier</h2>
            <div class="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                <template x-for="(item, index) in cart">
                    <div class="glass p-5 rounded-[2rem] flex justify-between items-center">
                        <div><p class="font-bold text-lg italic" x-text="item.name"></p><p class="text-orange-500 font-black" x-text="item.price + ' F'"></p></div>
                        <button @click="cart.splice(index, 1)" class="text-red-500 text-xs font-bold uppercase">Retirer</button>
                    </div>
                </template>
            </div>
            <button x-show="cart.length > 0" @click="step = 2" class="w-full bg-orange-500 text-black font-black py-6 rounded-[2rem] text-xl mt-4 uppercase italic">Procéder ➔</button>
        </div>

        <div x-show="step === 2" class="space-y-4 overflow-y-auto no-scrollbar">
            <h2 class="text-4xl font-black mb-4 text-orange-500 italic uppercase">Infos</h2>
            <input x-model="name" type="text" placeholder="Nom" class="w-full glass p-6 rounded-2xl outline-none text-white font-bold">
            <input x-model="phone" type="tel" placeholder="Téléphone" class="w-full glass p-6 rounded-2xl outline-none text-white font-bold">
            <input x-model="address" type="text" placeholder="Quartier" class="w-full glass p-6 rounded-2xl outline-none text-white font-bold">
            <div class="grid grid-cols-2 gap-3 mt-4">
                <button @click="paymentMethod = 'MTN'" :class="paymentMethod === 'MTN' ? 'bg-yellow-500 text-black' : 'bg-white/5 border-white/10'" class="py-4 rounded-2xl font-black text-xs border uppercase">MTN Money</button>
                <button @click="paymentMethod = 'Moov'" :class="paymentMethod === 'Moov' ? 'bg-blue-600 text-white' : 'bg-white/5 border-white/10'" class="py-4 rounded-2xl font-black text-xs border uppercase">Moov Money</button>
            </div>
            <div class="p-5 bg-orange-500/10 border border-orange-500/20 rounded-[2rem]">
                <div x-show="paymentMethod === 'MTN'" class="text-center"><p class="text-[10px] text-yellow-500 font-bold uppercase">MTN</p><p class="text-white font-black text-2xl italic">51 25 55 85</p></div>
                <div x-show="paymentMethod === 'Moov'" class="text-center"><p class="text-[10px] text-blue-400 font-bold uppercase">Moov</p><p class="text-white font-black text-2xl italic">95 00 00 00</p></div>
                <p class="text-orange-500 text-[10px] font-black text-center uppercase mt-2 italic">⚠️ Le transfert valide la course</p>
            </div>
            <button @click="finalizeOrder" :disabled="isSending" class="w-full bg-white text-black font-black py-6 rounded-[2rem] text-xl mt-4 uppercase">VALIDER 🛵</button>
        </div>
    </div>
</body>
</html>
