<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroumiam Pro | Livraison Cotonou 229</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#FF6B00', success: '#00C853', darkBg: '#080808', cardBg: '#121212' }}}
        }
    </script>
    <style>[x-cloak] { display: none !important; } .no-scrollbar::-webkit-scrollbar { display: none; }</style>
</head>
<body class="bg-darkBg text-white antialiased font-sans" x-data="vroumApp">

    <header class="sticky top-0 z-50 bg-darkBg/90 backdrop-blur border-b border-white/5 h-16 flex items-center px-4">
        <div class="max-w-4xl mx-auto w-full flex justify-between items-center">
            <button @click="page = 'home'" class="text-2xl font-black italic tracking-tighter text-primary">Vroumiam</button>
            <button @click="cartOpen = true" class="relative bg-cardBg p-2 rounded-full border border-white/10 hover:border-primary transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                <span x-show="cart.length > 0" x-text="cart.length" class="absolute -top-1 -right-1 bg-primary text-[10px] px-1.5 rounded-full font-bold border-2 border-darkBg"></span>
            </button>
        </div>
    </header>

    <div x-show="page === 'home'" x-cloak>
        <section class="py-10 px-4 text-center max-w-2xl mx-auto">
            <h1 class="text-4xl md:text-6xl font-black italic mb-4 leading-tight">Cotonou est servi <span class="text-primary underline decoration-white/10">Vite.</span></h1>
            <p class="text-gray-500 font-bold text-[10px] uppercase tracking-[0.3em]">Burgers • Alloco • Pizza • 25min</p>
        </section>

        <main class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-4 pb-24">
            <template x-for="res in restaurants" :key="res.id">
                <div @click="activeResto = res; page = 'menu'" class="cursor-pointer bg-cardBg rounded-[2rem] overflow-hidden border border-white/5 hover:border-primary transition duration-300">
                    <img :src="res.img" class="h-40 w-full object-cover">
                    <div class="p-5">
                        <div class="flex justify-between items-center">
                            <h3 class="font-black text-xl italic" x-text="res.name"></h3>
                            <span class="bg-primary/10 text-primary px-2 py-1 rounded text-[10px] font-black uppercase" x-text="res.time + ' min'"></span>
                        </div>
                        <p class="text-gray-500 text-xs mt-1" x-text="res.cuisine"></p>
                    </div>
                </div>
            </template>
        </main>
    </div>

    <div x-show="page === 'menu'" x-cloak>
        <div class="max-w-2xl mx-auto p-4 pt-6 space-y-4">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-black italic uppercase" x-text="activeResto.name"></h2>
                <button @click="page = 'home'" class="text-[10px] font-black text-gray-500 uppercase tracking-widest hover:text-white">← Changer Resto</button>
            </div>
            <template x-for="dish in dishes">
                <div class="bg-cardBg p-5 rounded-[1.5rem] border border-white/5 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg" x-text="dish.name"></h3>
                        <p class="text-primary font-black italic text-sm" x-text="dish.price + ' FCFA'"></p>
                    </div>
                    <button @click="addToCart(dish)" class="bg-white text-black h-10 w-10 rounded-xl font-black text-xl hover:bg-primary transition shadow-lg shadow-white/5">+</button>
                </div>
            </template>
        </div>
    </div>

    <div x-show="page === 'track'" x-cloak class="h-[70vh] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-24 h-24 bg-success/20 rounded-full flex items-center justify-center mb-8 animate-pulse">
            <span class="text-5xl">🛵</span>
        </div>
        <h2 class="text-4xl font-black italic uppercase text-success">Commande Envoyée !</h2>
        <p class="text-gray-400 mt-4 max-w-xs text-sm">Nous t'avons redirigé vers WhatsApp pour finaliser la livraison avec le livreur.</p>
        <button @click="page = 'home'; cart = []" class="mt-10 text-primary font-black uppercase text-[10px] tracking-widest border-b-2 border-primary pb-1">Nouvelle commande</button>
    </div>

    <div x-show="cartOpen" x-cloak class="fixed inset-0 z-">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-md" @click="cartOpen = false"></div>
        <div class="absolute inset-y-0 right-0 w-full max-w-sm bg-darkBg p-6 flex flex-col shadow-2xl border-l border-white/5">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black italic uppercase tracking-tighter">Ton Panier</h2>
                <button @click="cartOpen = false" class="text-gray-500 hover:text-white text-xl font-black">✕</button>
            </div>
            <div class="flex-1 overflow-y-auto space-y-3 no-scrollbar">
                <template x-for="(item, index) in cart" :key="index">
                    <div class="flex justify-between items-center bg-cardBg p-4 rounded-xl border border-white/5">
                        <p class="font-bold text-sm" x-text="item.name"></p>
                        <button @click="cart.splice(index, 1)" class="text-red-500 p-2">✕</button>
                    </div>
                </template>
                <div x-show="cart.length === 0" class="text-center py-20 text-gray-700 font-black uppercase text-[10px] tracking-widest italic">Vraiment aucune envie ? 🍕</div>
            </div>
            
            <div class="pt-6 border-t border-white/10" x-show="cart.length > 0">
                <div class="flex justify-between text-2xl font-black italic mb-6"><span>Total</span><span class="text-primary" x-text="totalPrice() + ' FCFA'"></span></div>
                
                <button @click="submitToWhatsApp()" :disabled="loading"
                    class="w-full bg-primary disabled:opacity-50 py-5 rounded-2xl font-black text-xl italic uppercase shadow-xl shadow-orange-600/30 flex items-center justify-center space-x-3 transition active:scale-95">
                    <span x-show="!loading">🚀 Commander via WhatsApp</span>
                    <span x-show="loading" class="animate-spin border-2 border-black border-t-transparent rounded-full w-5 h-5"></span>
                </button>
                <p class="text-[9px] text-center text-gray-500 mt-4 uppercase font-bold tracking-widest">Le GPS sera activé pour le livreur</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('vroumApp', () => ({
                page: 'home', cartOpen: false, loading: false, activeResto: {}, cart: [],
                
                // DATA PRO
                restaurants: [
                    { id: 1, name: 'Burger Palace', cuisine: 'Gourmet Burger', time: '20', img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600' },
                    { id: 2, name: 'Chez Maman', cuisine: 'Local (Alloco/Atassi)', time: '15', img: 'https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?w=600' },
                    { id: 3, name: 'Pizza Roma', cuisine: 'Feu de bois', time: '30', img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600' },
                    { id: 4, name: 'Sushi Zen', cuisine: 'Japonais Frais', time: '40', img: 'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=600' }
                ],
                dishes: [
                    { name: 'Le Combo Vroum XXL', price: 4500 },
                    { name: 'Poisson Braisé & Alloco', price: 3000 },
                    { name: 'Pizza Regina Cotonou', price: 5500 },
                    { name: 'Menu Burger Cheese', price: 3500 }
                ],

                addToCart(item) {
                    this.cart.push({...item});
                    this.cartOpen = true;
                },

                totalPrice() { return this.cart.reduce((s, i) => s + i.price, 0); },

                // LOGIQUE DE COMMANDE RÉELLE
                submitToWhatsApp() {
                    const WHATSAPP_NUM = "2290147535343"; // REMPLACE PAR TON NUMÉRO (Format: 22960000000)
                    this.loading = true;

                    // 1. Demander la localisation GPS
                    if (!navigator.geolocation) {
                        alert("Ton navigateur ne supporte pas le GPS.");
                        this.loading = false;
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        (pos) => {
                            const lat = pos.coords.latitude;
                            const lon = pos.coords.longitude;
                            const mapLink = `https://www.google.com/maps?q=${lat},${lon}`;
                            
                            // 2. Construire le message
                            let msg = `*NOUVELLE COMMANDE VROUMIAM*%0A---------------------------%0A`;
                            msg += `*Restaurant:* ${this.activeResto.name}%0A%0A`;
                            this.cart.forEach(item => {
                                msg += `• ${item.name} - ${item.price} FCFA%0A`;
                            });
                            msg += `%0A*TOTAL : ${this.totalPrice()} FCFA*%0A---------------------------%0A`;
                            msg += `📍 *MA POSITION :* ${mapLink}`;

                            // 3. Envoyer et Nettoyer
                            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${msg}`, '_blank');
                            this.loading = false;
                            this.cartOpen = false;
                            this.page = 'track';
                        },
                        (err) => {
                            alert("Erreur GPS : Active ta localisation pour être livré précisément !");
                            this.loading = false;
                        }
                    );
                }
            }));
        });
    </script>
</body>
</html>
