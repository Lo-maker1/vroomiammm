<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - Livraison Rapide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            messagingSenderId: "13433812189",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fonction pour envoyer la commande
        window.sendOrderToFirebase = (orderData) => {
            const ordersRef = ref(db, 'orders');
            const newOrderRef = push(ordersRef);
            return set(newOrderRef, {
                ...orderData,
                timestamp: Date.now(),
                status: 'En cours'
            });
        };
    </script>
</head>
<body class="bg-black text-white font-sans" x-data="{ 
    cart: [], 
    showCart: false,
    name: '',
    phone: '',
    address: '',
    isSending: false,
    products: [
        { id: 1, name: 'Burger Atchéké', price: 2500, img: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500' },
        { id: 2, name: 'Alloco Spécial', price: 1500, img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=500' },
        { id: 3, name: 'Poulet Bicyclette', price: 4500, img: 'https://images.unsplash.com/photo-1562967914-608f82629710?w=500' }
    ],
    addToCart(p) { this.cart.push(p); },
    get total() { return this.cart.reduce((sum, p) => sum + p.price, 0); },
    async confirmOrder() {
        if(!this.name || !this.phone || !this.address) return alert('Remplis tout, champion !');
        this.isSending = true;
        
        const orderData = {
            clientName: this.name,
            phone: this.phone,
            address: this.address,
            items: this.cart.map(p => p.name).join(', '),
            total: this.total
        };

        try {
            await window.sendOrderToFirebase(orderData);
            alert('Commande envoyée ! Vroum Vroum 🛵');
            this.cart = [];
            this.showCart = false;
        } catch (e) {
            alert('Erreur de connexion...');
        } finally {
            this.isSending = false;
        }
    }
}">

    <header class="p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-black z-40">
        <h1 class="text-2xl font-black text-orange-500">VROUMIAM</h1>
        <button @click="showCart = true" class="relative bg-orange-500 p-2 rounded-full">
            🛒 <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-white text-black text-[10px] font-bold px-1 rounded-full" x-text="cart.length"></span>
        </button>
    </header>

    <main class="p-4 grid grid-cols-1 gap-6">
        <template x-for="product in products" :key="product.id">
            <div class="bg-gray-900 rounded-3xl overflow-hidden border border-gray-800 shadow-xl">
                <img :src="product.img" class="w-full h-48 object-cover">
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <h3 class="font-bold text-lg" x-text="product.name"></h3>
                        <p class="text-orange-500 font-bold" x-text="product.price + ' FCFA'"></p>
                    </div>
                    <button @click="addToCart(product)" class="bg-white text-black font-bold px-4 py-2 rounded-xl active:scale-95 transition">Ajouter</button>
                </div>
            </div>
        </template>
    </main>

    <div x-show="showCart" class="fixed inset-0 bg-black/90 z-50 p-4 flex flex-col">
        <div class="flex justify-between mb-8">
            <h2 class="text-2xl font-bold text-orange-500">Ton Panier</h2>
            <button @click="showCart = false" class="text-4xl">&times;</button>
        </div>

        <div class="flex-1 overflow-y-auto">
            <template x-for="item in cart">
                <div class="flex justify-between border-b border-gray-800 py-2">
                    <span x-text="item.name"></span>
                    <span class="text-orange-500" x-text="item.price + ' FCFA'"></span>
                </div>
            </template>
            <div class="mt-4 text-xl font-bold flex justify-between">
                <span>TOTAL :</span>
                <span class="text-orange-500" x-text="total + ' FCFA'"></span>
            </div>
        </div>

        <div class="mt-4 space-y-3">
            <input x-model="name" type="text" placeholder="Ton nom" class="w-full bg-gray-900 p-4 rounded-xl border border-gray-700">
            <input x-model="phone" type="tel" placeholder="Numéro de téléphone" class="w-full bg-gray-900 p-4 rounded-xl border border-gray-700">
            <input x-model="address" type="text" placeholder="Quartier / Rue" class="w-full bg-gray-900 p-4 rounded-xl border border-gray-700">
            <button @click="confirmOrder" :disabled="isSending" class="w-full bg-orange-500 text-black font-black py-4 rounded-2xl text-lg shadow-lg shadow-orange-500/20 active:scale-95 transition">
                <span x-show="!isSending">COMMANDER MAINTENANT 🛵</span>
                <span x-show="isSending">ENVOI EN COURS...</span>
            </button>
        </div>
    </div>

</body>
</html>
