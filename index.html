<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VROUMIAM - L'élite de la livraison</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Configuration simplifiée
        const firebaseConfig = {
            apiKey: "AIzaSyBuzgGc5iumNCurtTpVM5X3_3TK95qbQpc",
            authDomain: "vroomiam.firebaseapp.com",
            databaseURL: "https://vroomiam-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vroomiam",
            storageBucket: "vroomiam.firebasestorage.app",
            appId: "1:13433812189:web:40b8ba4b14cb0a4deb9734"
        };
        
        // Initialisation immédiate
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans" x-data="{ 
    cart: [], 
    showCart: false,
    category: 'all',
    step: 1,
    name: '', phone: '', address: '', delivery: 'express', isSending: false,
    
    restaurants: [
        { id: 1, name: 'Burger King', cat: 'burger', price: 3500, img: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=600' },
        { id: 2, name: 'Pizza Relax', cat: 'pizza', price: 5000, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600' },
        { id: 3, name: 'Maquis du Port', cat: 'local', price: 2500, img: 'https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?w=600' }
    ],

    addToCart(item) { this.cart.push({ ...item, id_order: Date.now() }); },
    get total() { return this.cart.reduce((sum, p) => sum + p.price, 0) + (this.delivery === 'express' ? 1000 : 500); },

    async finalizeOrder() {
        if(!this.name || !this.phone || !this.address) return alert('Infos manquantes !');
        this.isSending = true;

        // Données simplifiées au maximum pour éviter le rejet Firebase
        const orderData = {
            nom: this.name,
            tel: this.phone,
            lieu: this.address,
            commande: this.cart.map(p => p.name).join(', '),
            prix: this.total,
            date: new Date().toLocaleString(),
            status: 'Nouveau'
        };

        try {
            // Utilisation de la méthode standard (plus rapide)
            await db.ref('orders').push(orderData);
            alert('🚀 COMMANDE REÇUE ! Vroumiam arrive.');
            this.cart = []; this.showCart = false; this.step = 1;
            this.name = ''; this.phone = ''; this.address = '';
        } catch(err) { 
            console.error(err);
            alert('Erreur Firebase. Vérifie tes Rules (Read/Write = true)'); 
        } finally { 
            this.isSending = false; 
        }
    }
}">

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-black/80 z-50 border-b border-white/5">
        <h1 class="text-3xl font-black italic text-orange-500">VROUMIAM</h1>
        <button @click="showCart = true" class="glass p-3 rounded-2xl relative">
            🛍️ <span x-show="cart.length > 0" class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] h-5 w-5 flex items-center justify-center rounded-full" x-text="cart.length"></span>
        </button>
    </nav>

    <main class="px-6 py-8 grid grid-cols-1 gap-6">
        <template x-for="restau in restaurants">
            <div class="bg-gray-900/50 rounded-3xl overflow-hidden border border-white/5">
                <img :src="restau.img" class="h-48 w-full object-cover">
                <div class="p-5 flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-bold" x-text="restau.name"></h3>
                        <p class="text-orange-500 font-bold" x-text="restau.price + ' FCFA'"></p>
                    </div>
                    <button @click="addToCart(restau)" class="bg-orange-500 text-black h-12 w-12 rounded-xl font-bold">+</button>
                </div>
            </div>
        </template>
    </main>

    <div x-show="showCart" class="fixed inset-0 z-50 bg-black/98 p-6 flex flex-col" x-transition>
        <div class="flex justify-between mb-8">
            <button @click="showCart = false" class="text-gray-400 font-bold">RETOUR</button>
            <span class="text-orange-500 font-bold">VOTRE PANIER</span>
        </div>

        <div x-show="step === 1" class="flex flex-col h-full">
            <div class="flex-1 overflow-y-auto space-y-4">
                <template x-for="item in cart">
                    <div class="glass p-4 rounded-2xl flex justify-between items-center">
                        <span x-text="item.name"></span>
                        <span class="text-orange-500 font-bold" x-text="item.price + ' FCFA'"></span>
                    </div>
                </template>
            </div>
            <div x-show="cart.length > 0" class="pt-6 border-t border-white/10">
                <div class="flex justify-between text-xl font-bold mb-4">
                    <span>TOTAL</span>
                    <span class="text-orange-500" x-text="total + ' FCFA'"></span>
                </div>
                <button @click="step = 2" class="w-full bg-orange-500 text-black font-black py-5 rounded-2xl text-xl">LIVRER ICI</button>
            </div>
        </div>

        <div x-show="step === 2" class="space-y-4">
            <input x-model="name" type="text" placeholder="Ton Nom" class="w-full glass p-5 rounded-2xl outline-none border-none">
            <input x-model="phone" type="tel" placeholder="Numéro de téléphone" class="w-full glass p-5 rounded-2xl outline-none border-none">
            <input x-model="address" type="text" placeholder="Quartier précis" class="w-full glass p-5 rounded-2xl outline-none border-none">
            
            <button @click="finalizeOrder" :disabled="isSending" class="w-full bg-white text-black font-black py-5 rounded-2xl text-xl mt-4">
                <span x-show="!isSending">VALIDER LA COMMANDE 🛵</span>
                <span x-show="isSending">CHARGEMENT...</span>
            </button>
        </div>
    </div>
</body>
</html>
